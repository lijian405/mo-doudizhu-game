<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联机斗地主</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div id="game-container">
    <!-- 登录界面 -->
    <div id="login-screen">
      <div class="login-container">
        <div class="login-header">
          <h1>联机斗地主</h1>
          <p class="login-subtitle">AI时代的多人在线游戏体验</p>
        </div>
        <div class="login-form">
          <div class="form-group">
            <label for="player-name">玩家名称</label>
            <div class="input-container">
              <i class="icon">👤</i>
              <input type="text" id="player-name" placeholder="请输入您的名称">
            </div>
          </div>
          <div class="form-group">
            <label for="room-id">房间ID</label>
            <div class="input-container">
              <i class="icon">🏠</i>
              <input type="text" id="room-id" placeholder="请输入房间ID">
            </div>
          </div>
          <div class="login-buttons">
            <button id="join-room-btn">加入房间</button>
            <button id="create-room-btn">创建房间</button>
          </div>
        </div>
        <div class="login-footer">
          <p>© 2026 联机斗地主 - AI时代的游戏体验</p>
        </div>
      </div>
    </div>

    <!-- 游戏房间界面 -->
    <div id="room-screen" style="display: none;">
      <div class="room-container">
        <div class="room-header">
          <h2>房间: <span id="current-room-id"></span></h2>
          <p class="room-subtitle">等待其他玩家加入...</p>
        </div>
        <div class="room-content">
          <div id="players-list">
            <h3>玩家列表</h3>
            <ul id="players-ul"></ul>
          </div>
        </div>
        <div class="room-buttons">
          <button id="start-game-btn">开始游戏</button>
          <button id="leave-room-btn">离开房间</button>
        </div>
      </div>
    </div>

    <!-- 叫分界面 -->
    <div id="calling-screen" style="display: none;">
      <div class="calling-container">
        <div class="calling-header">
          <h2>叫分阶段</h2>
          <p class="calling-subtitle">轮到您了，请选择叫分</p>
        </div>
        <div id="calling-info">
          <p>当前叫分玩家: <span id="current-caller"></span></p>
          <p>最高叫分: <span id="highest-score">0</span></p>
        </div>
        <div class="calling-buttons">
          <button id="call-1-btn">1分</button>
          <button id="call-2-btn">2分</button>
          <button id="call-3-btn">3分</button>
          <button id="call-pass-btn">不叫</button>
        </div>
      </div>
    </div>

    <!-- 游戏界面 -->
    <div id="game-screen" style="display: none;">
      <!-- 提示消息 -->
      <div id="game-message" class="game-message"></div>
      
      <!-- 顶部玩家 -->
      <div class="player-area top-player">
        <div class="player-info">
          <h3 id="top-player-name"></h3>
          <div class="player-score" id="top-player-score">分值: 1000</div>
          <div class="landlord-badge" id="top-player-landlord"></div>
          <div class="turn-indicator" id="top-player-turn"></div>
          <div class="countdown-indicator" id="top-player-countdown"></div>
          <div class="player-cards" id="top-player-cards"></div>
        </div>
      </div>

      <!-- 地主牌 -->
      <div class="landlord-cards" id="landlord-cards">
        <h4>地主牌</h4>
        <div class="cards-container" id="landlord-cards-container"></div>
      </div>

      <!-- 中间区域 -->
      <div class="middle-area">
        <!-- 左侧玩家 -->
        <div class="player-area left-player">
          <div class="player-info">
          <h3 id="left-player-name"></h3>
          <div class="player-score" id="left-player-score">分值: 1000</div>
          <div class="landlord-badge" id="left-player-landlord"></div>
          <div class="turn-indicator" id="left-player-turn"></div>
          <div class="countdown-indicator" id="left-player-countdown"></div>
          <div class="player-cards" id="left-player-cards"></div>
        </div>
        </div>

        <!-- 出牌区域 -->
        <div class="play-area" id="play-area">
          <h4>出牌区域</h4>
          <div class="cards-container" id="play-cards-container"></div>
        </div>
      </div>

      <!-- 底部玩家（自己） -->
      <div class="player-area bottom-player">
        <div class="player-info">
          <h3 id="bottom-player-name"></h3>
          <div class="player-score" id="bottom-player-score">分值: 1000</div>
          <div class="landlord-badge" id="bottom-player-landlord"></div>
          <div class="turn-indicator" id="bottom-player-turn"></div>
          <div class="countdown-indicator" id="bottom-player-countdown"></div>
          <div class="player-cards" id="bottom-player-cards"></div>
        </div>
        <div class="action-buttons">
          <button id="play-btn">出牌</button>
          <button id="pass-btn">不出</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
</body>
</html>
